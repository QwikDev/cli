name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Format check
        run: vp check

      - name: Lint
        run: vp lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Test on ${{ matrix.runtime }} / ${{ matrix.os }} / ${{ matrix.pm }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        experimental: [false]
        runtime: [node, deno, bun]
        pm: [pnpm, yarn]

    steps:
      - uses: actions/checkout@v4

      - name: Remove lockfile and packageManager field
        run: |
          rm pnpm-lock.yaml
          node -e "const p=require('./package.json'); delete p.packageManager; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
        shell: bash

      - name: Install panam
        run: npm i -g panam-cli

      - uses: siguici/setup-js@v1
        with:
          runtime: ${{ matrix.runtime }}
          pm: ${{ matrix.pm }}
          scripts: build

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - name: Test (Japa integration)
        run: node bin/test.ts

      - name: Test (Vitest unit)
        run: vp test
